name: Update Market Heat Data

on:
  workflow_dispatch:        # tombol manual tetap bisa
  schedule:
    - cron: "0 6 5 * *"     # tiap tanggal 5, jam 06:00 UTC

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil kode dari repo
        uses: actions/checkout@v5

      - name: Siapkan Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install bahan
        run: pip install -r requirements.txt

      - name: Jalankan pengambilan data FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python src/fetch_fred.py

      - name: Ambil Shiller CAPE
        run: python src/fetch_cape.py

      - name: Ambil S&P 500 bulanan
        run: python src/fetch_sp500_monthly.py

      - name: Ambil FINRA margin debt
        run: python src/fetch_finra.py

      - name: Ambil NAAIM exposure
        run: python src/fetch_naaim.py

      - name: Ambil AAII sentiment
        run: python src/fetch_aaii.py

      - name: Hitung Heat Score
        run: python src/build_score.py

      - name: Hitung Tactical 5% overlay
        run: python src/build_tactical.py

      - name: Simpan hasil ke repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ docs/
          git commit -m "Update data & dashboard" || echo "Tidak ada perubahan"
          git push origin main || (git pull --rebase origin main && git push origin main)
